name: CI

# Cancel any in-progress run for the same branch/PR to avoid queue build-up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - 'src/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - 'eslint.config.js'
      - 'tailwind.config.ts'
      - 'package*.json'
  pull_request:
    paths:
      - 'src/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - 'eslint.config.js'
      - 'tailwind.config.ts'
      - 'package*.json'

jobs:
  # ── Job 1: TypeScript type-check ──────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node + dependencies
        uses: ./.github/actions/setup-node-npm
        with:
          node-version: '22'

      - name: Run type check
        run: npx tsc -b --noEmit

  # ── Job 2: ESLint (runs in parallel with typecheck) ────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node + dependencies
        uses: ./.github/actions/setup-node-npm
        with:
          node-version: '22'

      - name: Run ESLint on src/
        run: npx eslint src/

  # ── Job 3: Vite production build (requires typecheck to pass) ─────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node + dependencies
        uses: ./.github/actions/setup-node-npm
        with:
          node-version: '22'

      - name: Build (Vite production)
        # Skip the redundant tsc step since typecheck job already passed.
        # Run only the Vite bundler to catch any rollup/plugin-level errors.
        run: npx vite build

      - name: Write build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript check | ${{ needs.typecheck.result == 'success' && 'passed' || 'failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Vite build       | ${{ job.status == 'success' && 'passed' || 'failed' }} |" >> $GITHUB_STEP_SUMMARY
          du -sh upload/demo 2>/dev/null && echo "" >> $GITHUB_STEP_SUMMARY && echo "**Output size:** $(du -sh upload/demo | cut -f1)" >> $GITHUB_STEP_SUMMARY || true
