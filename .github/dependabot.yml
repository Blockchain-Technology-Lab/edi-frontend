version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    target-branch: 'main'
    versioning-strategy: increase
    allow:
      - dependency-type: 'all'
    groups:
      dev-dependencies:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
      production-dependencies:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
    labels:
      - 'dependencies'
      - 'security'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'deps'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    labels:
      - 'ci'
    commit-message:
      prefix: 'ci'
