name: CSV Validation

# Only run when CSV data files are modified — not on every push.
concurrency:
  group: csv-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - 'public/output/**/*.csv'
  pull_request:
    paths:
      - 'public/output/**/*.csv'

jobs:
  validate-csv:
    name: Validate CSV files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + dependencies
        uses: ./.github/actions/setup-node-npm
        with:
          node-version: '22'

      - name: Validate public/output/**/*.csv
        id: csv_check
        run: node scripts/validate-csvs.mjs

      - name: Upload validation report on failure
        if: failure() && steps.csv_check.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: csv-validation-report
          path: csv-validation-report.txt
          retention-days: 14
